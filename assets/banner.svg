<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:0.1"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bg)" rx="0"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="40" x2="1280" y2="40" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="80" x2="1280" y2="80" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="120" x2="1280" y2="120" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="160" x2="1280" y2="160" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="200" x2="1280" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="240" x2="1280" y2="240" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="280" x2="1280" y2="280" stroke="#fff" stroke-width="1"/>
    <line x1="160" y1="0" x2="160" y2="320" stroke="#fff" stroke-width="1"/>
    <line x1="320" y1="0" x2="320" y2="320" stroke="#fff" stroke-width="1"/>
    <line x1="480" y1="0" x2="480" y2="320" stroke="#fff" stroke-width="1"/>
    <line x1="640" y1="0" x2="640" y2="320" stroke="#fff" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="320" stroke="#fff" stroke-width="1"/>
    <line x1="960" y1="0" x2="960" y2="320" stroke="#fff" stroke-width="1"/>
    <line x1="1120" y1="0" x2="1120" y2="320" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="1100" cy="80" r="120" fill="url(#glow)" opacity="0.15"/>
  <circle cx="180" cy="250" r="80" fill="url(#glow)" opacity="0.1"/>

  <!-- Phone mockup -->
  <g transform="translate(870, 40)">
    <!-- Phone frame -->
    <rect x="0" y="0" width="160" height="240" rx="16" fill="#1a1a2e" stroke="url(#accent)" stroke-width="2" filter="url(#shadow)"/>
    <!-- Screen -->
    <rect x="8" y="24" width="144" height="200" rx="4" fill="#16213e"/>

    <!-- Scroll view content area -->
    <rect x="16" y="32" width="128" height="36" rx="6" fill="#0f3460" opacity="0.7"/>
    <rect x="24" y="40" width="60" height="6" rx="3" fill="#667eea" opacity="0.5"/>
    <rect x="24" y="50" width="40" height="4" rx="2" fill="#667eea" opacity="0.3"/>

    <rect x="16" y="76" width="128" height="36" rx="6" fill="#0f3460" opacity="0.7"/>
    <rect x="24" y="84" width="50" height="6" rx="3" fill="#667eea" opacity="0.5"/>
    <rect x="24" y="94" width="35" height="4" rx="2" fill="#667eea" opacity="0.3"/>

    <!-- Focused input (highlighted) -->
    <rect x="16" y="120" width="128" height="36" rx="6" fill="#667eea" opacity="0.25" stroke="#667eea" stroke-width="1.5"/>
    <rect x="24" y="128" width="55" height="6" rx="3" fill="#fff" opacity="0.9"/>
    <rect x="24" y="138" width="70" height="4" rx="2" fill="#fff" opacity="0.4"/>
    <!-- Cursor blink -->
    <rect x="96" y="128" width="2" height="6" rx="1" fill="#667eea">
      <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
    </rect>

    <!-- Keyboard rising -->
    <g>
      <rect x="8" y="168" width="144" height="56" rx="0" fill="#1a1a2e" opacity="0.95">
        <animate attributeName="y" values="224;168;168" dur="1.5s" fill="freeze" keyTimes="0;0.5;1"/>
      </rect>
      <!-- Keyboard rows -->
      <g opacity="0.6">
        <rect x="16" y="174" width="26" height="14" rx="3" fill="#2d2d5e">
          <animate attributeName="y" values="230;174;174" dur="1.5s" fill="freeze" keyTimes="0;0.5;1"/>
        </rect>
        <rect x="46" y="174" width="26" height="14" rx="3" fill="#2d2d5e">
          <animate attributeName="y" values="230;174;174" dur="1.5s" fill="freeze" keyTimes="0;0.5;1"/>
        </rect>
        <rect x="76" y="174" width="26" height="14" rx="3" fill="#2d2d5e">
          <animate attributeName="y" values="230;174;174" dur="1.5s" fill="freeze" keyTimes="0;0.5;1"/>
        </rect>
        <rect x="106" y="174" width="38" height="14" rx="3" fill="#2d2d5e">
          <animate attributeName="y" values="230;174;174" dur="1.5s" fill="freeze" keyTimes="0;0.5;1"/>
        </rect>
        <rect x="16" y="192" width="38" height="14" rx="3" fill="#2d2d5e">
          <animate attributeName="y" values="248;192;192" dur="1.5s" fill="freeze" keyTimes="0;0.5;1"/>
        </rect>
        <rect x="58" y="192" width="44" height="14" rx="3" fill="#667eea" opacity="0.4">
          <animate attributeName="y" values="248;192;192" dur="1.5s" fill="freeze" keyTimes="0;0.5;1"/>
        </rect>
        <rect x="106" y="192" width="38" height="14" rx="3" fill="#2d2d5e">
          <animate attributeName="y" values="248;192;192" dur="1.5s" fill="freeze" keyTimes="0;0.5;1"/>
        </rect>
        <rect x="28" y="210" width="104" height="14" rx="3" fill="#2d2d5e">
          <animate attributeName="y" values="266;210;210" dur="1.5s" fill="freeze" keyTimes="0;0.5;1"/>
        </rect>
      </g>
    </g>

    <!-- Scroll indicator arrow -->
    <g opacity="0.6" filter="url(#softglow)">
      <path d="M80 114 L80 108 M76 112 L80 116 L84 112" stroke="#667eea" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>

  <!-- Main Title -->
  <text x="100" y="120" font-family="'SF Pro Display', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="#ffffff" letter-spacing="-0.5">
    <tspan fill="url(#accent)">Smart</tspan> Keyboard View
  </text>

  <!-- Subtitle -->
  <text x="100" y="158" font-family="'SF Pro Text', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="17" fill="#a0a0c0" letter-spacing="0.2">
    Modern, TypeScript-native keyboard-aware scroll view for React Native
  </text>

  <!-- Tag pills -->
  <g transform="translate(100, 180)">
    <rect x="0" y="0" width="68" height="26" rx="13" fill="#667eea" opacity="0.15"/>
    <text x="34" y="17" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#667eea" text-anchor="middle" font-weight="500">Hooks</text>

    <rect x="78" y="0" width="92" height="26" rx="13" fill="#667eea" opacity="0.15"/>
    <text x="124" y="17" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#667eea" text-anchor="middle" font-weight="500">TypeScript</text>

    <rect x="180" y="0" width="80" height="26" rx="13" fill="#667eea" opacity="0.15"/>
    <text x="220" y="17" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#667eea" text-anchor="middle" font-weight="500">forwardRef</text>

    <rect x="270" y="0" width="80" height="26" rx="13" fill="#667eea" opacity="0.15"/>
    <text x="310" y="17" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#667eea" text-anchor="middle" font-weight="500">Zero Deps</text>
  </g>

  <!-- React Native indicator -->
  <g transform="translate(100, 228)">
    <text font-family="'SF Mono', 'Fira Code', monospace" font-size="12" fill="#6a6a8e" letter-spacing="0.5">
      <tspan fill="#764ba2">import</tspan>
      <tspan fill="#a0a0c0"> { KeyboardAwareScrollView } </tspan>
      <tspan fill="#764ba2">from</tspan>
      <tspan fill="#667eea"> 'react-native-smart-keyboard-view'</tspan>
    </text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="316" width="1280" height="4" fill="url(#accent)" opacity="0.6"/>
</svg>
